# ============================================================
# Query-Adaptive Hybrid Retrieval — Pipeline Configuration
# ============================================================
# This is the configuration file for the unified pipeline that
# rebuilds the entire experiment on top of *oracle* alpha labels
# obtained by per-query grid search (instead of soft NDCG-based
# estimates as in the legacy version).
#
# Run order:
#     python src/cleanup.py        # one-time cleanup of stale artefacts
#     python src/pipeline.py       # end-to-end training + evaluation
#
# Every section of pipeline.py caches its outputs to disk; rerunning
# the pipeline skips already-completed sections automatically.
# ============================================================

# ------------------------------------------------------------
# Datasets — BEIR datasets that are concatenated into a single
# merged working dataset.  Each dataset contributes
# min(n_queries_per_dataset, available) test queries.  The
# pipeline reads this list with no hardcoded length anywhere.
# ------------------------------------------------------------
# Stats: (test queries | corpus docs | avg relevant docs per query)
#   scifact            300 queries  |    5 084 docs |  1.1 avg
#   nfcorpus           323 queries  |    3 633 docs | 38.2 avg
#   arguana          1 406 queries  |    8 674 docs |  1.0 avg
#   fiqa               648 queries  |   57 638 docs |  2.6 avg
#   scidocs          1 000 queries  |   25 657 docs |  4.9 avg
# ------------------------------------------------------------
datasets:
  - scifact
  - nfcorpus
  - arguana
  - fiqa
  - scidocs
  - trec-covid

# ------------------------------------------------------------
# Paths (relative to the project root)
# ------------------------------------------------------------
paths:
  datasets_folder:  "data/datasets"     # BEIR raw datasets
  processed_folder: "data/processed"    # tokenised corpora, indices, embeddings
  results_folder:   "data/results"      # csv/json/png outputs
  models_folder:    "data/models"       # final pickled models

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  stemmer_language: "english"

# ------------------------------------------------------------
# BM25 — initial defaults; Step 3 grid-searches and overwrites
# the values written into  data/results/bm25_best_params.json.
# Steps 4+ then read that JSON and use the best parameters.
# ------------------------------------------------------------
bm25:
  k1: 1.5
  b: 0.75
  use_stemming: true

# ------------------------------------------------------------
# Embedding model (BAAI/bge-m3 dense head)
# ------------------------------------------------------------
embeddings:
  model_name: "BAAI/bge-m3"
  batch_size: 64

# ------------------------------------------------------------
# Dense search
# ------------------------------------------------------------
dense_search:
  query_chunk_size:  100
  corpus_chunk_size: 50000

# ------------------------------------------------------------
# Benchmark / evaluation constants
# ------------------------------------------------------------
benchmark:
  top_k:  100      # candidate-pool size for retrieval
  ndcg_k: 100      # primary evaluation cut-off (NDCG / MRR)
  rrf:
    k: 60          # RRF damping constant (Cormack et al. 2009)
  bootstrap:
    n_resamples: 1000       # bootstrap iterations for the 95% CIs
    ci:          0.95
    seed:        42

# ------------------------------------------------------------
# Sampling and split — defines the 1500-query merged dataset
# Train / Dev / Test = 70 / 15 / 15  (stratified per dataset)
# 10-fold CV runs on the (train + dev) = 85% portion.
# ------------------------------------------------------------
sampling:
  n_queries_per_dataset: 300
  truncation_seed:       31415
  test_fraction:         0.15
  dev_fraction:          0.15
  cv_n_folds:            10
  random_seed:           42

# ------------------------------------------------------------
# Step 3 — BM25 grid search (k1, b, use_stemming)
# Macro NDCG@10 across the 1500-query merged dataset.
# ------------------------------------------------------------
bm25_grid_search:
  k1_values:           [0.8, 1.2, 1.5, 1.6, 2.0]
  b_values:            [0.0, 0.25, 0.5, 0.75, 1.0]
  use_stemming_values: [true, false]

# ------------------------------------------------------------
# Step 4 — Oracle alpha grid search
# Per-query brute-force search over [alpha_min, alpha_max] in
# steps of alpha_step.  101 alphas with the defaults below.
# ------------------------------------------------------------
oracle_alpha_search:
  alpha_min:  0.0
  alpha_max:  1.0
  alpha_step: 0.01

# ------------------------------------------------------------
# Routing-feature parameters — used by the weak-model dataset
# (Step 5)
# ------------------------------------------------------------
routing_features:
  overlap_k:          10
  feature_stat_k:     10
  epsilon:            1.0e-8
  ce_smoothing_alpha: 1.0

# ------------------------------------------------------------
# Cap on the size of every grid search.  Set generously to
# satisfy the "<= 1500 trained models per grid" requirement.
# Combos beyond this cap are not evaluated (deterministically
# truncated by canonical iteration order).
# ------------------------------------------------------------
max_models_per_grid: 1500

# ------------------------------------------------------------
# Step 6 — Weak-model grid search
# 16 hand-crafted features as input.
# ------------------------------------------------------------
weak_model_grid_search:
  models:
    logistic_regression:
      C: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]

    random_forest:
      n_estimators:     [100, 300]
      max_depth:        [5, 10, null]
      min_samples_leaf: [1, 2]
      max_features:     ["sqrt"]

    extra_trees:
      n_estimators:     [100, 300]
      max_depth:        [5, 10, null]
      min_samples_leaf: [1, 2]
      max_features:     ["sqrt"]

    xgboost:
      n_estimators:     [100, 300]
      max_depth:        [4, 6, 8]
      learning_rate:    [0.05, 0.1, 0.3]
      subsample:        [0.8]
      colsample_bytree: [0.8]
      min_child_weight: [1]
      gamma:            [0.0]

    lightgbm:
      n_estimators:  [100, 300]
      num_leaves:    [15, 31]
      learning_rate: [0.05, 0.1, 0.3]

    mlp:
      hidden_layer_sizes: [[64], [128], [64, 32]]
      alpha:              [0.001, 0.01]
      learning_rate_init: [0.001]
      batch_size:         [32]
      activation:         ["relu"]

# ------------------------------------------------------------
# Step 12 — Strong-model grid search
# Input: 1024-dim BGE-M3 query embeddings.
# ------------------------------------------------------------
strong_model_grid_search:
  models:
    ridge:
      alpha: [0.01, 0.1, 1.0, 10.0, 100.0, 1000.0]

    elasticnet:
      alpha:    [0.001, 0.01, 0.1, 1.0]
      l1_ratio: [0.1, 0.5, 0.9]

    knn:
      n_neighbors: [5, 10, 20, 50]
      weights:     ["uniform", "distance"]

    svr:
      C:       [0.1, 1.0, 10.0]
      gamma:   ["scale"]
      epsilon: [0.01, 0.1]

    mlp:
      hidden_layer_sizes: [[256], [512], [256, 128], [512, 256]]
      alpha:              [0.001, 0.01]
      learning_rate_init: [0.001, 0.0001]
      batch_size:         [32, 64]

    xgboost:
      n_estimators:     [100, 300]
      max_depth:        [4, 6, 8]
      learning_rate:    [0.1, 0.3]
      subsample:        [0.8]
      colsample_bytree: [0.1, 0.3]

    random_forest:
      n_estimators:     [100, 300]
      max_depth:        [null, 8]
      min_samples_leaf: [1, 2]
      max_features:     ["sqrt", 0.1]

    extra_trees:
      n_estimators:     [100, 300]
      max_depth:        [null, 8]
      min_samples_leaf: [1, 2]
      max_features:     ["sqrt", 0.1]

# ------------------------------------------------------------
# Step 16 — MoE meta-learner grid search
# Inputs: 2 alphas (alpha_weak, alpha_strong) + abs(diff) for
# the non-tree models.  Simpler grids since input is 2-D.
# ------------------------------------------------------------
moe_grid_search:
  models:
    ridge:
      alpha: [0.001, 0.01, 0.1, 1.0, 10.0]

    lasso:
      alpha: [0.001, 0.01, 0.1, 1.0]

    elasticnet:
      alpha:    [0.001, 0.01, 0.1, 1.0]
      l1_ratio: [0.1, 0.5, 0.9]

    svr:
      C:       [0.1, 1.0, 10.0]
      epsilon: [0.01, 0.05, 0.1]

    knn:
      n_neighbors: [5, 10, 20]
      weights:     ["uniform", "distance"]

    random_forest:
      n_estimators:     [100, 200]
      max_depth:        [3, 5, null]
      min_samples_leaf: [1, 3]

    extra_trees:
      n_estimators:     [100, 200]
      max_depth:        [3, 5, null]
      min_samples_leaf: [1, 3]

    mlp:
      hidden_layer_sizes: [[16], [32], [16, 8], [32, 16]]
      alpha:              [0.001, 0.01]

    xgboost:
      n_estimators:  [50, 100, 200]
      max_depth:     [2, 3, 4]
      learning_rate: [0.05, 0.1]

    lightgbm:
      n_estimators:  [50, 100, 200]
      max_depth:     [2, 3]
      learning_rate: [0.05, 0.1]

# ------------------------------------------------------------
# Step 21 — Cross-encoder reranker
# ------------------------------------------------------------
reranker:
  model_name:      "cross-encoder/ms-marco-MiniLM-L-6-v2"
  batch_size_cuda: 128
  batch_size_cpu:  32

# ------------------------------------------------------------
# Step 22 — Paired significance test
# ------------------------------------------------------------
significance_test:
  alpha: 0.05
